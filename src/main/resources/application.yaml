server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${MSSQL_URL}
    username: ${MSSQL_USER}
    password: ${MSSQL_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximumPoolSize: 30
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
      org.hibernate.envers.store_data_at_delete: true
      org.hibernate.envers.global_with_modified_flag: true
    database-platform: org.hibernate.dialect.SQLServerDialect
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    sender.from: ${EMAIL_FROM}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false
      mail.smtp.quitwait: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # Always expose component and detail sections so the new SMPP health indicator is usable
      # from actuator without having to redeploy with extra management settings.
      show-components: always
      show-details: always

sms:
  smpp:
    host: ${MTN_SMPP_HOST}
    port: ${MTN_SMPP_PORT}

    # DO NOT hardcode production credentials here.
    # Use environment variables/secrets:
    systemId: ${MTN_SMPP_SYSTEM_ID}
    password: ${MTN_SMPP_PASSWORD}

    systemType: ""
    bindType: TRANSCEIVER
    interfaceVersion: 34

    connectTimeoutMs: 30000
    requestExpiryTimeoutMs: 30000
    bindTimeoutMs: 30000

    windowSize: 50
    enquireLinkIntervalMs: 30000
    # Used as the base delay for exponential bind retry backoff after failures.
    reconnectDelayMs: 10000
    # Scheduler cadence that checks SMPP session health, executes idle-time rebinds,
    # and performs controlled recovery after channel closures.
    healthCheckIntervalMs: ${MTN_SMPP_HEALTH_CHECK_INTERVAL_MS:30000}
    # MTN asked for a fresh rebind after idle periods. The code treats this as an idle timeout,
    # not a hard teardown while traffic is actively flowing.
    forceRebindIntervalMs: ${MTN_SMPP_FORCE_REBIND_INTERVAL_MS:30000}

    registeredDelivery: true

    defaultSenderId: ${MTN_SMPP_SENDER_ID}
    defaultSourceMsisdn: ${SMPP_MSISDN}

    # MTN contract: total submits per second per instance.
    tps: 10

    # New: number of SMPP sessions (start with 1; increase only if Airtel allows)
    sessions: 1

  # Additional provider: Airtel.
  # Configure via environment variables (for example AIRTEL_SMPP_HOST, AIRTEL_SMPP_PORT, etc).
  airtel:
    smpp:
      host: ${AIRTEL_SMPP_HOST:}
      port: ${AIRTEL_SMPP_PORT:0}
      systemId: ${AIRTEL_SMPP_SYSTEM_ID:}
      password: ${AIRTEL_SMPP_PASSWORD:}
      systemType: ""
      bindType: TRANSCEIVER
      interfaceVersion: 34
      connectTimeoutMs: 30000
      requestExpiryTimeoutMs: 30000
      bindTimeoutMs: 30000
      windowSize: 50
      enquireLinkIntervalMs: 30000
      # Airtel uses the same backoff logic, but forced rebind is off by default unless enabled explicitly.
      reconnectDelayMs: 10000
      healthCheckIntervalMs: ${AIRTEL_SMPP_HEALTH_CHECK_INTERVAL_MS:30000}
      forceRebindIntervalMs: ${AIRTEL_SMPP_FORCE_REBIND_INTERVAL_MS:0}
      registeredDelivery: true
      defaultSenderId: ${AIRTEL_SMPP_SENDER_ID:}
      tps: ${AIRTEL_SMPP_TPS:10}
      sessions: ${AIRTEL_SMPP_SESSIONS:1}

    addressing:
      sourceTonAlphanumeric: 5
      sourceNpiAlphanumeric: 0
      sourceTonInternational: 1
      sourceNpiE164: 1
      destTonInternational: 1
      destNpiE164: 1

  addressing:
    # For alphanumeric sender IDs:
    sourceTonAlphanumeric: 5   # ALPHANUMERIC
    sourceNpiAlphanumeric: 0   # UNKNOWN
    # For international numeric (E.164) numbers:
    sourceTonInternational: 1  # INTERNATIONAL
    sourceNpiE164: 1           # E164
    destTonInternational: 1    # INTERNATIONAL
    destNpiE164: 1             # E164

  gateway:
    # Legacy in-memory queue settings remain for compatibility, but durable dispatch now uses MySQL.
    queueCapacity: 50000
    workerThreads: 32
    maxTextChars: 2000
    otpPriority: 100
    notificationPriority: 10
    otpDefaultTtlSeconds: 300
    maxRetryAttempts: 5
    retryBaseDelaySeconds: 5
    retryMaxDelaySeconds: 300
    workerIdleSleepMs: 100
    recoveryIntervalSeconds: 30
    staleProcessingTimeoutSeconds: 120

    # Alphanumeric sender IDs are commonly limited to 11 by many SMSCs.
    # If your provider allows 12+ (e.g. "PrideBankLtd" is 12), increase this.
    maxAlphanumericSenderIdLength: 11

app:
  security:
    admin:
      username: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}
      email: ${ADMIN_EMAIL}
      passwordExpiryDays: ${ADMIN_PASSWORD_EXPIRY_DAYS:90}
      passwordChangeTokenTtlMinutes: ${ADMIN_PASSWORD_CHANGE_TOKEN_TTL_MINUTES:10}
      maxFailedLoginAttempts: ${ADMIN_MAX_FAILED_LOGIN_ATTEMPTS:3}
    jwt:
      # Base64-encoded secret (e.g. from 256-bit key). Do not hardcode; use env.
      secret: ${JWT_SECRET}
      accessTtlSeconds: ${JWT_ACCESS_TTL_SECONDS}
      refreshTtlSeconds: ${JWT_REFRESH_TTL_SECONDS}
    cors:
      # For production, set explicit origins instead of '*'
      allowedOrigins: ${CORS_ALLOWED_ORIGINS:*}
      allowedMethods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
      allowedHeaders: ${CORS_ALLOWED_HEADERS:*}
      exposedHeaders: ${CORS_EXPOSED_HEADERS:}
      allowCredentials: ${CORS_ALLOW_CREDENTIALS:false}
      maxAgeSeconds: ${CORS_MAX_AGE_SECONDS:3600}
    passwordReset:
      frontendUrl: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:3000/reset-password}
      tokenTtlMinutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    login:
      frontendUrl: ${LOGIN_FRONTEND_URL:http://localhost:3000/login}
    loginOtp:
      ttlMinutes: ${LOGIN_OTP_TTL_MINUTES:5}
      maxAttempts: ${LOGIN_OTP_MAX_ATTEMPTS:5}
    client:
      password:
        email: ${CLIENT_ACCOUNT_PASSWORD_EMAIL}


