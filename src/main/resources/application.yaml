server:
  port: 8080

spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximumPoolSize: 30
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

sms:
  smpp:
    host: ${SMPP_HOST}
    port: ${SMPP_PORT}

    # DO NOT hardcode production credentials here.
    # Use environment variables/secrets:
    systemId: ${SMPP_USER_NAME}
    password: ${SMPP_PASSWORD}

    systemType: ""
    bindType: TRANSCEIVER
    interfaceVersion: 34

    connectTimeoutMs: 30000
    requestExpiryTimeoutMs: 30000
    bindTimeoutMs: 30000

    windowSize: 50
    enquireLinkIntervalMs: 30000
    reconnectDelayMs: 10000

    registeredDelivery: true

    defaultSenderId: ${SMPP_SENDER_ID}
    defaultSourceMsisdn: ${SMPP_MSISDN}

    # Airtel contract: TPS=20. This should represent total segments/sec per instance.
    # If you run 2 pods, set this to 10 each (or implement distributed rate limiting).
    tps: 20

    # New: number of SMPP sessions (start with 1; increase only if Airtel allows)
    sessions: 1

  # Additional provider: Airtel.
  # Configure via environment variables (for example AIRTEL_SMPP_HOST, AIRTEL_SMPP_PORT, etc).
  airtel:
    smpp:
      host: ${AIRTEL_SMPP_HOST:}
      port: ${AIRTEL_SMPP_PORT:0}
      systemId: ${AIRTEL_SMPP_USER_NAME:}
      password: ${AIRTEL_SMPP_PASSWORD:}
      systemType: ""
      bindType: TRANSCEIVER
      interfaceVersion: 34
      connectTimeoutMs: 30000
      requestExpiryTimeoutMs: 30000
      bindTimeoutMs: 30000
      windowSize: 50
      enquireLinkIntervalMs: 30000
      reconnectDelayMs: 10000
      registeredDelivery: true
      defaultSenderId: ${AIRTEL_SMPP_SENDER_ID:}
      tps: ${AIRTEL_SMPP_TPS:20}
      sessions: ${AIRTEL_SMPP_SESSIONS:1}

    addressing:
      sourceTonAlphanumeric: 5
      sourceNpiAlphanumeric: 0
      sourceTonInternational: 1
      sourceNpiE164: 1
      destTonInternational: 1
      destNpiE164: 1

  addressing:
    # For alphanumeric sender IDs:
    sourceTonAlphanumeric: 5   # ALPHANUMERIC
    sourceNpiAlphanumeric: 0   # UNKNOWN
    # For international numeric (E.164) numbers:
    sourceTonInternational: 1  # INTERNATIONAL
    sourceNpiE164: 1           # E164
    destTonInternational: 1    # INTERNATIONAL
    destNpiE164: 1             # E164

  gateway:
    # New: bounded queue + workers for peak handling
    queueCapacity: 50000
    workerThreads: 32
    maxTextChars: 2000

    # Alphanumeric sender IDs are commonly limited to 11 by many SMSCs.
    # If your provider allows 12+ (e.g. "PrideBankLtd" is 12), increase this.
    maxAlphanumericSenderIdLength: 11

app:
  security:
    admin:
      username: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}
    jwt:
      # Base64-encoded secret (e.g. from 256-bit key). Do not hardcode; use env.
      secret: ${JWT_SECRET}
      accessTtlSeconds: ${JWT_ACCESS_TTL_SECONDS}
      refreshTtlSeconds: ${JWT_REFRESH_TTL_SECONDS}
    cors:
      # For production, set explicit origins instead of '*'
      allowedOrigins: ${CORS_ALLOWED_ORIGINS:*}
      allowedMethods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
      allowedHeaders: ${CORS_ALLOWED_HEADERS:*}
      exposedHeaders: ${CORS_EXPOSED_HEADERS:}
      allowCredentials: ${CORS_ALLOW_CREDENTIALS:false}
      maxAgeSeconds: ${CORS_MAX_AGE_SECONDS:3600}